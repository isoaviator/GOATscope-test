name: Build GOATscope DLL

on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: microsoft/setup-msbuild@v2

      - name: Build DLL
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          cl /LD /EHsc /D WIN32 /D _USE_MATH_DEFINES /I . GOATscope.cpp /Fe:GOATscope.dll /link /DEF:GOATscope.def

      - name: Upload DLL
        uses: actions/upload-artifact@v4
        with:
          name: GOATscope-dll
          path: GOATscope.dll
